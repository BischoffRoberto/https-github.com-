<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/login.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#dc3545">

    <div class="card shadow p-4 login-card">
        <div class="text-center mb-3">
            <img src="/static/logo.png" alt="Logo" class="mb-2 rounded-logo" style="width: 80px;">
            <h4 class="fw-bold text-primary">Iniciar sesión</h4>
        </div>

        <!-- Formulario de login -->
        <form method="post" action="/login">
            {% if ip %}
            <div class="mb-2 text-end text-muted small">IP detectada: {{ ip }}</div>
            {% endif %}
            <div class="mb-3">
                <label for="usuario" class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" name="usuario" required>
            </div>
            <div class="mb-3 position-relative">
                <label for="contrasena" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="contrasena" name="contrasena" required>
                <span id="togglePass" style="position:absolute; top:38px; right:12px; cursor:pointer; user-select:none;">👁️</span>
            </div>

            {% if error %}
            <div class="alert alert-danger py-1">{{ error }}</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
        </form>
            <div class="text-center mt-2 small text-muted">Creado por @Roberto Bischoff</div>
    </div>

<script>
        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').then(() => console.log('SW registered')).catch(()=>{});
        }
        // toggle password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('togglePass');
            const pass = document.getElementById('contrasena');
            if (toggle && pass) {
                toggle.addEventListener('click', () => {
                    pass.type = pass.type === 'password' ? 'text' : 'password';
                });
            }
        });
    </script>
</body>
</html>
